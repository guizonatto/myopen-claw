<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="480" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#111827">Arquitetura do Projeto MyOpen-Claw</text>

  <!-- ENTRY LAYER -->
  <rect x="40" y="80" width="880" height="100" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-dasharray="5,5" />
  <text x="50" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4b5563">ENTRY / TRIGGERS</text>
  <rect x="100" y="115" width="200" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" filter="url(#shadow)" />
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Crons (Agendamento)</text>
  <rect x="380" y="115" width="200" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" filter="url(#shadow)" />
  <text x="480" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Triggers (Eventos)</text>
  <rect x="660" y="115" width="200" height="50" rx="6" fill="#ffffff" stroke="#3b82f6" filter="url(#shadow)" />
  <text x="760" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Webhooks</text>

  <!-- ORCHESTRATION LAYER -->
  <rect x="40" y="200" width="880" height="100" rx="8" fill="#eff6ff" stroke="#bfdbfe" />
  <text x="50" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">ORCHESTRATION / AGENTS</text>
  <rect x="240" y="235" width="200" height="50" rx="6" fill="#ffffff" stroke="#2563eb" filter="url(#shadow)" />
  <text x="340" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Pipes (Workflows)</text>
  <rect x="520" y="235" width="200" height="50" rx="6" fill="#ffffff" stroke="#2563eb" filter="url(#shadow)" />
  <text x="620" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">Agents (Reasoning)</text>

  <!-- CAPABILITIES LAYER -->
  <rect x="40" y="320" width="880" height="120" rx="8" fill="#f0fdf4" stroke="#bbf7d0" />
  <text x="50" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">CAPABILITIES</text>
  <rect x="100" y="365" width="200" height="50" rx="6" fill="#ffffff" stroke="#16a34a" filter="url(#shadow)" />
  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">Skills (Logica/IA)</text>
  <rect x="380" y="365" width="200" height="50" rx="6" fill="#ffffff" stroke="#16a34a" filter="url(#shadow)" />
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">Tools (Externo)</text>
  <rect x="660" y="365" width="200" height="50" rx="6" fill="#ffffff" stroke="#16a34a" filter="url(#shadow)" />
  <text x="760" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">MCPs (Servicos)</text>

  <!-- DATA LAYER -->
  <rect x="40" y="460" width="880" height="100" rx="8" fill="#fff7ed" stroke="#ffedd5" />
  <text x="50" y="485" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9a3412">DATA / PERSISTENCE</text>
  <rect x="240" y="495" width="200" height="50" rx="6" fill="#ffffff" stroke="#ea580c" filter="url(#shadow)" />
  <text x="340" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9a3412">PostgreSQL / Vector</text>
  <rect x="520" y="495" width="200" height="50" rx="6" fill="#ffffff" stroke="#ea580c" filter="url(#shadow)" />
  <text x="620" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9a3412">Memory DB</text>

  <!-- ARROWS -->
  <path d="M 480 180 L 480 200" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 480 300 L 480 320" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 480 440 L 480 460" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />
</svg>