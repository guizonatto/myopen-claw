services:
  postgres:
    image: ankane/pgvector
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-evolution-db.sh:/docker-entrypoint-initdb.d/init-evolution-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    restart: unless-stopped
  # ---------------------------------------------------------------------------
  # Redis — required by evolution-api
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Evolution API — WhatsApp bridge (conecta ao openclaw via webhook)
  # ---------------------------------------------------------------------------

  
  evolution-api:
    build:
      context: ../evolution-api
      dockerfile: Dockerfile
    container_name: openclaw-evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - evolution.env
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy    
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/').then(r=>process.exit(r.ok||r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      start_period: 40s
      retries: 5

  llm-metrics-proxy:
    build:
      context: .
      dockerfile: docker/llm-metrics-proxy/Dockerfile
    container_name: llm-metrics-proxy
    restart: unless-stopped
    environment:
      - MODEL_USAGE_DB_PATH=/data/llm-usage.sqlite3
      - MODEL_USAGE_REPORT_TIMEZONE=${MODEL_USAGE_REPORT_TIMEZONE:-America/Sao_Paulo}
      - MODEL_USAGE_RETENTION_DAYS=${MODEL_USAGE_RETENTION_DAYS:-30}
      - OPENCLAW_GATEWAY_URL=http://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_CONFIG_PATH=/openclaw/openclaw.json
      - MODEL_LIMITS_CATALOG_PATH=/openclaw/workspace/configs/model-limits.json
      - MODEL_USAGE_SYNC_OPENCLAW_MODELS=${MODEL_USAGE_SYNC_OPENCLAW_MODELS:-true}
      - MODEL_USAGE_SYNC_OPENCLAW_MODELS_STRICT=${MODEL_USAGE_SYNC_OPENCLAW_MODELS_STRICT:-true}
      - MODEL_USAGE_REPORT_DISCORD_CHANNEL_ID=${MODEL_USAGE_REPORT_DISCORD_CHANNEL_ID:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      - MODEL_USAGE_POSTGRES_URL=postgresql://openclaw:openclaw@postgres:5432/openclaw
      - MODEL_USAGE_REDIS_URL=redis://openclaw-redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - llm-metrics-data:/data
      - openclaw-data:/openclaw:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read(); print('ok')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    user: root
    # Não use restart/systemd: gateway é iniciado via entrypoint.sh
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/root/.openclaw
      - llm-metrics-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./openclaw.json:/opt/openclaw-bootstrap/openclaw.json
      - ./skills:/opt/openclaw-bootstrap/workspace/skills
      - ./skills:/app/skills:ro
      - ./configs:/opt/openclaw-bootstrap/workspace/configs
      - ./crons:/opt/openclaw-bootstrap/workspace/crons
      - ./scripts:/opt/openclaw-bootstrap/workspace/scripts
      - ./openclaw:/opt/openclaw-bootstrap/workspace/openclaw:ro
      - ./hooks:/opt/openclaw-bootstrap/hooks
      - ./memclaw-memclaw-0.9.39.tgz:/opt/openclaw-bootstrap/memclaw.tgz
      - ./mcps:/app/mcps
      - ./requirements.txt:/app/requirements.txt
      - ./llm_usage_telemetry:/app/llm_usage_telemetry:ro
      - ./plugins:/app/plugins:ro
      - ./agents:/app/agents:ro
      - C:/Vault/Pessoal:/vault
    environment:
      # - AUTH_CHOICE=${AUTH_CHOICE}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}      
      # - ZAI_API_KEY=${ZAI_API_KEY}
      # - OPENAI_CODEX=${OPENAI_CODEX}
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # - GATEWAY_BIND=${GATEWAY_BIND}
      # - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # - ENABLE_SANDBOX=${ENABLE_SANDBOX}
      # - GLOBAL_WEB_SEARCH_PROVIDER=${GLOBAL_WEB_SEARCH_PROVIDER}
      # - TAVILY_API_KEY=${TAVILY_API_KEY}
      # - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_ZIND_CONTENT_CHANNEL_ID=${DISCORD_ZIND_CONTENT_CHANNEL_ID}
      # - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      # - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      # - ENABLE_WHATSAPP=${ENABLE_WHATSAPP}
      # - MATRIX_HOMESERVER=${MATRIX_HOMESERVER}
      # - MATRIX_USER_ID=${MATRIX_USER_ID}
      # - MATRIX_PASSWORD=${MATRIX_PASSWORD}
      # - NOSTR_PRIVATE_KEY=${NOSTR_PRIVATE_KEY}
      # - ENABLE_SIGNAL=${ENABLE_SIGNAL}
      # - ENABLE_IMESSAGE=${ENABLE_IMESSAGE}
      # - LINE_TOKEN=${LINE_TOKEN}
      # - ZALO_TOKEN=${ZALO_TOKEN}
      # - FEISHU_APP_ID=${FEISHU_APP_ID}
      # - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      # - AUTO_INSTALL_SKILLS=${AUTO_INSTALL_SKILLS}
      # - MCP_API_KEY=${MCP_API_KEY}
      # - SKILLS_GIT_REPO=${SKILLS_GIT_REPO}
      - DATABASE_URL=postgresql://openclaw:openclaw@postgres:5432/openclaw
      - CORTEX_MEM_URL=http://cortex-mem:8085
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - GLOBAL_WEB_SEARCH_PROVIDER=${GLOBAL_WEB_SEARCH_PROVIDER:-duckduckgo}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - BRAVE_API_KEYS=${BRAVE_API_KEYS:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - MODEL_USAGE_PROXY_ENABLED=${MODEL_USAGE_PROXY_ENABLED:-true}
      - MODEL_USAGE_PROXY_ROOT=${MODEL_USAGE_PROXY_ROOT:-http://llm-metrics-proxy:8080}
      - MODEL_USAGE_PROXY_URL=${MODEL_USAGE_PROXY_URL:-http://llm-metrics-proxy:8080/openclaw}
      - MODEL_USAGE_PROXY_TOKEN=${MODEL_USAGE_PROXY_TOKEN:-usage-router-local}
      - MODEL_USAGE_DB_PATH=/data/llm-usage.sqlite3
      - MODEL_USAGE_REPORT_TIMEZONE=${MODEL_USAGE_REPORT_TIMEZONE:-America/Sao_Paulo}
      - MODEL_USAGE_REPORT_DISCORD_CHANNEL_ID=${MODEL_USAGE_REPORT_DISCORD_CHANNEL_ID:-}
      - DISCORD_ERROR_WEBHOOK_URL=${DISCORD_ERROR_WEBHOOK_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    entrypoint:
      - /bin/bash
      - /usr/local/bin/entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      cortex-mem:
        condition: service_healthy
      mcp-crm:
        condition: service_started
      mcp-shopping-tracker:
        condition: service_started
      evolution-api:
        condition: service_started
      llm-metrics-proxy:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18789/healthz >/dev/null"]
      interval: 30s
      timeout: 30s
      start_period: 90s
      retries: 5

# MCPs rodam como containers separados. O OpenClaw os acessa via 'docker exec' (STDIO).
  mcp-trends:
    build:
      context: ./mcps/trends_mcp
      dockerfile: Dockerfile
    image: mcp-trends:latest
    container_name: mcp-trends
    environment:
      - DATABASE_URL=postgresql://openclaw:openclaw@postgres:5432/openclaw
      - MCP_API_KEY=${MCP_API_KEY}
    volumes:
      - ./mcps/trends_mcp:/app
      - ./mcp-trends-data:/mcp-trends
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
  mcp-leads:
    build:
      context: ./mcps/leads_mcp
      dockerfile: Dockerfile
    image: mcp-leads:latest
    container_name: mcp-leads
    environment:
      - MCP_API_KEY=${MCP_API_KEY}
      - CRM_EXECUTE_URL=http://mcp-crm:8001/execute
    volumes:
      - ./mcps/leads_mcp:/app
    depends_on:
      mcp-crm:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
  mcp-crm:
    build:
      context: ./mcps/crm_mcp
      dockerfile: Dockerfile
    image: mcp-crm:latest
    container_name: mcp-crm
    environment:
      - DATABASE_URL=postgresql://openclaw:openclaw@postgres:5432/openclaw
      - MCP_API_KEY=${MCP_API_KEY}
      - EVOLUTION_URL=http://openclaw-evolution-api:8080
      - EVOLUTION_INSTANCE=zind
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - OPENCLAW_GATEWAY_URL=http://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./mcps/crm_mcp:/app
      - ./mcp-crm-data:/mcp-crm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
  mcp-shopping-tracker:
    build:
      context: ./mcps/shopping_tracker_mcp
      dockerfile: Dockerfile
    image: mcp-shopping-tracker:latest
    container_name: mcp-shopping-tracker
    environment:
      - DATABASE_URL=postgresql://openclaw:openclaw@postgres:5432/openclaw
      - MCP_API_KEY=${MCP_API_KEY}
    volumes:
      - ./mcps/shopping_tracker_mcp:/app
      - ./mcp-shopping-tracker-data:/mcp-shopping-tracker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - .env

  # ---------------------------------------------------------------------------
  # Backup — backup diário de PostgreSQL, Qdrant e SQLite → Google Drive
  # Roda às 4h (após auto-updater das 3h). Requer rclone.conf montado.
  # Setup: configure rclone.conf com remote "gdrive" e defina GDRIVE_FOLDER_ID no .env
  # ---------------------------------------------------------------------------
  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    container_name: openclaw-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PGHOST=postgres
      - PGUSER=openclaw
      - PGPASSWORD=openclaw
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-cortex_memories}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_ALERT_CHANNEL_ID=${DISCORD_ALERT_CHANNEL_ID:-}
    volumes:
      - llm-metrics-data:/data
      - ./rclone.conf:/root/.config/rclone/rclone.conf:ro
      - ./gdrive-sa.json:/secrets/gdrive-sa.json:ro
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Auto-updater — atualiza código e banco de dados diariamente às 3h
  # Não requer nenhuma ação manual. Só funciona se o repositório estiver no servidor.
  # ---------------------------------------------------------------------------
  auto-updater:
    build:
      context: ./scripts/updater
      dockerfile: Dockerfile
    container_name: openclaw-auto-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    depends_on:
      - mcp-crm
      - mcp-trends
      - mcp-shopping-tracker
      - openclaw-gateway
    
  # ---------------------------------------------------------------------------
  # Qdrant — Vector Database for Cortex-Mem
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    
  # ---------------------------------------------------------------------------
  # Cortex-Mem — Long-term Memory Service
  # ---------------------------------------------------------------------------
  cortex-mem:
    build:
      context: .
      dockerfile: docker/cortex-mem/Dockerfile
    container_name: cortex-mem
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6334
      - QDRANT_COLLECTION=cortex_memories
      - EMBEDDING_DIM=1024
      - LLM_API_KEY=${MODEL_USAGE_PROXY_TOKEN:-usage-router-local}
      - LLM_API_BASE_URL=${MODEL_USAGE_PROXY_ROOT:-http://llm-metrics-proxy:8080}/memclaw/v1
      - LLM_MODEL=usage-router/ollama/${OLLAMA_MODEL:-gemma4}
      - EMBEDDING_API_KEY=${MODEL_USAGE_PROXY_TOKEN:-usage-router-local}
      - EMBEDDING_API_BASE_URL=${MODEL_USAGE_PROXY_ROOT:-http://llm-metrics-proxy:8080}/memclaw/v1
      - EMBEDDING_MODEL_NAME=usage-router/ollama/${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - EMBEDDING_MODEL=usage-router/ollama/${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
    ports:
      - "8085:8085"
    volumes:
      - cortex-mem-data:/var/lib/cortex-mem
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    # Intencionalmente sem `env_file: .env` para evitar herdar `DATABASE_URL`
    # e outras variaveis nao relacionadas ao cortex-mem.

volumes:
  pgdata:
  openclaw-data:
  redis-data:
  evolution-instances:
  qdrant-data:
  cortex-mem-data:
  mcp-trends-data:
  mcp-crm-data:
  mcp-shopping-tracker-data:
  llm-metrics-data:
