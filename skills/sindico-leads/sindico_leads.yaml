name: sindico_leads
version: 0.1.0
description: Busca e cadastra leads de síndicos profissionais na web.
author: openclaw

tags:
  - leads
  - sindico
  - scraping
  - crm

input_schema:
  type: object
  properties:
    query:
      type: string
      description: Query de busca completa (opcional). Se omitida, será derivada de search_terms.
    search_terms:
      type: array
      items:
        type: string
      description: Lista de termos de busca para encontrar síndicos profissionais (opcional).
      default:
        - "São Paulo"
    max_results:
      type: integer
      description: Número máximo de leads a retornar.
      default: 50
  required: []

output_schema:
  type: array
  items:
    type: object
    properties:
      nome:
        type: string
      empresa:
        type: string
        nullable: true
      celular:
        type: string
    required:
      - nome
      - celular

run:
  pipe:
    - web_search:
        query: "{{ query | default(((search_terms | default(['São Paulo'])) | join(' '))) }} síndico profissional telefone celular"
        max_results: "{{ max_results | default(50) }}"
    - extract_leads:
        input: "{{ web_search.results }}"
    - deduplicate_leads:
        input: "{{ extract_leads.leads }}"
    - add_lead_crm:
        leads: "{{ deduplicate_leads.leads }}"
        tipo: "lead"
    - output:
        result: "{{ add_lead_crm.leads }}"
