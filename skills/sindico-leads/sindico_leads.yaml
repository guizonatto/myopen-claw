name: sindico_leads
description: >
  Configuração de busca para síndicos profissionais.
  Usado por skills/leads/fetch.py como fonte "sindico_leads".

search:
  terms_default:
    - "síndico profissional São Paulo"
    - "síndico profissional SP telefone celular"
    - "administradora condomínios SP síndico contato"
  query_template: "{{ terms | join(' ') }} telefone celular whatsapp"
  max_results: 50

mcp:
  server: mcp-leads
  operation: sindico_leads

output_schema:
  fields: [nome, apelido, tipo, telefone, whatsapp, email, linkedin, instagram, empresa, cargo, setor, notas]
  required: [nome]
  tipo_crm: sindico_profissional

deduplication:
  match_on: [nome, email, telefone]
  on_conflict: update_new_fields
